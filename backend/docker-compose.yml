# docker-compose.yml
version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: pycab-postgres
    environment:
      POSTGRES_DB: pycab
      POSTGRES_USER: pycab_user
      POSTGRES_PASSWORD: secure_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pycab_user -d pycab"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pycab-network

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: pycab-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pycab-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pycab-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://pycab_user:secure_password_123@postgres:5432/pycab
      REDIS_URL: redis://redis:6379/0
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_demo}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_demo}
      OSRM_URL: ${OSRM_URL:-http://router.project-osrm.org}
      BASE_FARE: ${BASE_FARE:-50}
      PER_KM: ${PER_KM:-10}
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - pycab-network
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: pycab-celery
    environment:
      DATABASE_URL: postgresql+asyncpg://pycab_user:secure_password_123@postgres:5432/pycab
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./logs:/app/logs
    networks:
      - pycab-network
    restart: unless-stopped

  # Celery Beat for scheduled tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: pycab-celery-beat
    command: celery -A celery_app.celery beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://pycab_user:secure_password_123@postgres:5432/pycab
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - pycab-network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: pycab-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - pycab-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pycab-network:
    driver: bridge